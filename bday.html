<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Someone Special</title>
  <style>
    :root {
      --bg-1: #040405;
      --bg-2: #0b0b13;
      --bg-3: #141427;
      --glow-pink: rgba(255, 111, 145, 0.45);
      --glow-gold: rgba(255, 210, 125, 0.35);
      --text-main: #f7f3ef;
      --text-soft: #c9c2ba;
      --accent: #ff8aa7;
      --accent-2: #ffd79a;
      --card: rgba(20, 18, 26, 0.68);
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(255, 138, 167, 0.10), transparent 30%),
                  radial-gradient(circle at 80% 80%, rgba(255, 215, 154, 0.12), transparent 35%),
                  linear-gradient(150deg, var(--bg-1), var(--bg-2) 40%, var(--bg-3));
      color: var(--text-main);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
      opacity: 0;
      animation: pageFade 900ms ease forwards;
    }

    @keyframes pageFade {
      to { opacity: 1; }
    }

    .stars,
    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.65), transparent 100%),
        radial-gradient(2px 2px at 80% 20%, rgba(255,215,154,0.55), transparent 100%),
        radial-gradient(1.6px 1.6px at 40% 80%, rgba(255,138,167,0.6), transparent 100%),
        radial-gradient(2px 2px at 65% 60%, rgba(255,255,255,0.5), transparent 100%),
        radial-gradient(1.8px 1.8px at 10% 70%, rgba(255,255,255,0.55), transparent 100%),
        radial-gradient(2px 2px at 90% 75%, rgba(255,215,154,0.45), transparent 100%);
      animation: drift 18s linear infinite;
      opacity: 0.55;
    }

    .stars::before {
      transform: scale(1.15);
      animation-duration: 28s;
      opacity: 0.35;
      filter: blur(0.3px);
    }

    .stars::after {
      transform: scale(0.9);
      animation-duration: 36s;
      opacity: 0.22;
      filter: blur(0.5px);
    }

    @keyframes drift {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
      100% { transform: translateY(0px); }
    }

    .ambient-glow {
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      filter: blur(45px);
      z-index: 0;
      pointer-events: none;
    }

    .glow-left {
      left: -120px;
      top: -80px;
      background: var(--glow-pink);
      animation: pulse 6.8s ease-in-out infinite;
    }

    .glow-right {
      right: -100px;
      bottom: -100px;
      background: var(--glow-gold);
      animation: pulse 7.6s ease-in-out infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.65; }
      50% { transform: scale(1.12); opacity: 0.9; }
    }

    .wrapper {
      z-index: 2;
      width: min(92vw, 860px);
      min-height: min(76vh, 560px);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: clamp(1.2rem, 2vw, 2rem);
      display: grid;
      place-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .wrapper::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background: linear-gradient(120deg, rgba(255,138,167,0.24), transparent 40%, rgba(255,215,154,0.2));
      z-index: -1;
      filter: blur(14px);
      animation: borderGlow 8s linear infinite;
    }

    @keyframes borderGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .intro,
    .message-zone {
      width: 100%;
      max-width: 720px;
      transition: opacity 450ms ease, transform 450ms ease;
    }

    .intro.hidden,
    .message-zone.hidden {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      position: absolute;
    }

    .intro-title {
      font-size: clamp(1.55rem, 2.8vw, 2.4rem);
      letter-spacing: 0.03em;
      margin-bottom: 0.7rem;
      text-shadow: 0 0 18px rgba(255, 138, 167, 0.25);
    }

    .intro-sub {
      color: var(--text-soft);
      font-size: clamp(0.95rem, 1.7vw, 1.08rem);
      margin-bottom: 1.8rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid rgba(255,255,255,0.15);
      background: linear-gradient(135deg, rgba(255,138,167,0.20), rgba(255,215,154,0.15));
      color: var(--text-main);
      padding: 0.75rem 1.15rem;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255, 138, 167, 0.18);
      background: linear-gradient(135deg, rgba(255,138,167,0.29), rgba(255,215,154,0.22));
    }

    button:active {
      transform: translateY(0);
    }

    .message-zone {
      display: grid;
      place-items: center;
      gap: 1.6rem;
    }

    .heart {
      width: 12px;
      height: 12px;
      background: var(--accent);
      transform: rotate(45deg);
      position: relative;
      animation: heartbeat 1.6s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(255,138,167,0.55));
      margin-bottom: 0.2rem;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    .heart::before { left: -6px; }
    .heart::after { top: -6px; }

    @keyframes heartbeat {
      0%, 100% { transform: rotate(45deg) scale(1); }
      25% { transform: rotate(45deg) scale(1.12); }
      50% { transform: rotate(45deg) scale(0.98); }
      75% { transform: rotate(45deg) scale(1.16); }
    }

    .typed-wrap {
      min-height: 220px;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 0.2rem 0.6rem;
    }

    .typed-text {
      font-size: clamp(1.04rem, 2.1vw, 1.25rem);
      line-height: 1.9;
      letter-spacing: 0.01em;
      max-width: 670px;
      color: #f8f4f0;
      text-shadow: 0 0 22px rgba(255, 215, 154, 0.12);
      white-space: pre-wrap;
      word-break: normal;
    }

    .cursor {
      display: inline-block;
      width: 0.6ch;
      margin-left: 0.08rem;
      color: var(--accent-2);
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .final-line {
      min-height: 1.4rem;
      color: var(--accent-2);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 600ms ease, transform 600ms ease;
      font-size: clamp(0.95rem, 1.7vw, 1.06rem);
      letter-spacing: 0.02em;
    }

    .final-line.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .wrapper {
        min-height: min(78vh, 700px);
        padding: 1rem;
      }

      .typed-wrap {
        min-height: 250px;
      }

      .intro-sub {
        line-height: 1.6;
      }
    }

    .balloon-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      top: -40px;
      width: var(--size, 14px);
      height: var(--size, 14px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.98), rgba(244, 244, 244, 0.84) 70%, rgba(228, 228, 228, 0.75));
      opacity: 0.74;
      animation: flowerFall var(--dur, 12s) linear forwards, sway var(--swayDur, 4.8s) ease-in-out infinite;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.18));
      z-index: var(--z, 1);
    }

    .flower::before,
    .flower::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
    }

    .flower::before {
      transform: rotate(55deg) scale(0.86);
    }

    .flower::after {
      transform: rotate(-55deg) scale(0.86);
    }

    @keyframes flowerFall {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
      }
      100% {
        transform: translateY(115vh) translateX(var(--drift, 0px)) rotate(var(--rot, 0deg));
      }
    }

    @keyframes sway {
      0%, 100% { margin-left: -4px; }
      50% { margin-left: 6px; }
    }

    .memory-btn {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 450ms ease, transform 450ms ease;
    }

    .memory-btn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .final-btn {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 450ms ease, transform 450ms ease;
    }

    .final-btn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .memory-tree-wrap {
      width: min(100%, 700px);
      margin-top: 0.2rem;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 700ms ease, max-height 900ms ease;
    }

    .memory-tree-wrap.show {
      opacity: 1;
      max-height: 460px;
    }

    .memory-tree {
      position: relative;
      margin: 1.2rem auto 0.2rem;
      width: min(96%, 640px);
      height: 320px;
      border-radius: 18px;
      background: radial-gradient(circle at 70% 20%, rgba(255, 215, 154, 0.16), transparent 35%),
                  radial-gradient(circle at 20% 85%, rgba(255, 138, 167, 0.14), transparent 30%),
                  linear-gradient(180deg, rgba(25, 20, 35, 0.76), rgba(15, 12, 24, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.02), 0 14px 28px rgba(0, 0, 0, 0.38);
      overflow: hidden;
    }

    .photo-leaf {
      position: absolute;
      width: clamp(98px, 16vw, 132px);
      height: clamp(98px, 16vw, 132px);
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, rgba(255, 215, 154, 0.7), rgba(255, 138, 167, 0.7));
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35), 0 0 22px rgba(255, 210, 125, 0.24);
      animation: leafFloat 4.2s ease-in-out infinite;
    }

    .photo-leaf img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.38);
    }

    .leaf-1 { top: 58px; left: 112px; animation-delay: 0.1s; }
    .leaf-2 { top: 36px; left: 256px; animation-delay: 0.7s; }
    .leaf-3 { top: 64px; right: 118px; animation-delay: 1.4s; }
    .leaf-4 { top: 168px; left: 192px; animation-delay: 0.4s; }
    .leaf-5 { top: 166px; right: 198px; animation-delay: 1.1s; }

    @keyframes leafFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 640px) {
      .memory-tree {
        height: 430px;
      }

      .leaf-1 { top: 48px; left: 20px; }
      .leaf-2 { top: 38px; left: 160px; }
      .leaf-3 { top: 170px; right: 28px; }
      .leaf-4 { top: 190px; left: 34px; }
      .leaf-5 { top: 278px; right: 130px; }
    }

    @media (max-width: 390px) {
      .leaf-2 { left: 132px; }
      .leaf-5 { right: 90px; }
    }

    .surprise-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      opacity: 0;
      visibility: hidden;
      transition: opacity 500ms ease, visibility 500ms ease;
      background: radial-gradient(circle at 50% 100%, rgba(31, 21, 40, 0.9), rgba(5, 5, 10, 0.98));
    }

    .surprise-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .fireworks-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .surprise-content {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1.2rem;
      pointer-events: none;
    }

    .surprise-title {
      font-size: clamp(1.9rem, 6vw, 4.6rem);
      letter-spacing: 0.08em;
      font-weight: 700;
      color: #fff7ef;
      text-shadow:
        0 0 10px rgba(255, 233, 205, 0.45),
        0 0 28px rgba(255, 153, 180, 0.45),
        0 0 42px rgba(255, 212, 138, 0.42);
      animation: titlePulse 2.4s ease-in-out infinite;
    }

    .surprise-sub {
      margin-top: 0.8rem;
      color: rgba(255, 245, 233, 0.88);
      font-size: clamp(0.9rem, 2.1vw, 1.2rem);
      letter-spacing: 0.05em;
    }

    .close-surprise {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 2;
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="ambient-glow glow-left" aria-hidden="true"></div>
  <div class="ambient-glow glow-right" aria-hidden="true"></div>

  <main class="wrapper">
    <section id="intro" class="intro">
      <h1 class="intro-title">A Little Midnight Surprise</h1>
      <p class="intro-sub">Close your eyes for a second, make a wish, and tap below.<br>This was made just for you.</p>
      <div class="actions">
        <button id="startBtn" type="button">Click Here for Surprise</button>
      </div>
    </section>

    <section id="messageZone" class="message-zone hidden" aria-live="polite">
      <div class="heart" aria-hidden="true"></div>
      <div class="typed-wrap">
        <p id="typedText" class="typed-text"></p>
      </div>
      <p id="finalLine" class="final-line">I am truly lucky to have you in my life.</p>
      <div class="actions">
        <button id="memoryBtn" class="memory-btn" type="button">Open Memory Tree</button>
        <button id="finalBtn" class="final-btn" type="button">Final Surprise</button>
        <button id="restartBtn" type="button">Replay Message</button>
      </div>
      <div id="memoryTreeWrap" class="memory-tree-wrap">
        <div class="memory-tree">
          <div class="photo-leaf leaf-1">
            <img src="./WhatsApp Image 2026-07-09 at 12.07.59 AM (1).jpeg" alt="Memory one">
          </div>
          <div class="photo-leaf leaf-2">
            <img src="./WhatsApp Image 2026-07-09 at 12.07.59 AM.jpeg" alt="Memory two">
          </div>
          <div class="photo-leaf leaf-3">
            <img src="/WhatsApp Image 2026-07-09 at 12.09.13 AM (1).jpeg" alt="Memory three">
          </div>
          <div class="photo-leaf leaf-4">
            <img src="./WhatsApp Image 2026-07-09 at 12.18.45 AM.jpeg" alt="Memory four">
          </div>
          <div class="photo-leaf leaf-5">
            <img src="./WhatsApp Image 2026-07-09 at 12.09.14 AM.jpeg" alt="Memory five">
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="balloonLayer" class="balloon-layer" aria-hidden="true"></div>

  <section id="surpriseOverlay" class="surprise-overlay" aria-hidden="true">
    <canvas id="fireworksCanvas" class="fireworks-canvas"></canvas>
    <button id="closeSurpriseBtn" class="close-surprise" type="button">Close</button>
    <div class="surprise-content">
      <div>
        <h2 class="surprise-title">HAPPY BIRTHDAY DADDY</h2>
        <p class="surprise-sub">May your smile stay this bright forever.</p>
      </div>
    </div>
  </section>

  <audio id="bgMusic" loop autoplay preload="auto">
    <source src="./WhatsApp Audio 2026-07-09 at 12.24.20 AM.mpeg" type="audio/mpeg">
  </audio>

  <script>
    const intro = document.getElementById("intro");
    const messageZone = document.getElementById("messageZone");
    const typedText = document.getElementById("typedText");
    const finalLine = document.getElementById("finalLine");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const memoryBtn = document.getElementById("memoryBtn");
    const finalBtn = document.getElementById("finalBtn");
    const memoryTreeWrap = document.getElementById("memoryTreeWrap");
    const bgMusic = document.getElementById("bgMusic");
    const balloonLayer = document.getElementById("balloonLayer");
    const surpriseOverlay = document.getElementById("surpriseOverlay");
    const fireworksCanvas = document.getElementById("fireworksCanvas");
    const closeSurpriseBtn = document.getElementById("closeSurpriseBtn");

    const scriptLines = [
      { text: "Happy Birthday, Daddy.", pauseAfter: 720 },
      { text: "\nTonight feels softer, warmer, and brighter because you exist.", pauseAfter: 920 },
      { text: "\nYou carry a quiet kind of magic that makes ordinary moments unforgettable.", pauseAfter: 980 },
      { text: "\nThank you for your laughter, your kindness, and the way you make life feel lighter.", pauseAfter: 1050 },
      { text: "\nI hope this year wraps you in peace, courage, and every joy your heart has been waiting for.", pauseAfter: 1120 },
      { text: "\nNo matter where life takes me, you will always be deeply special to me Daddy.", pauseAfter: 900 },
      { text: "\nThis is just a small surprise from my side LOVE YOU SO MUCH DADDY", pauseAfter: 900 },
    ];

    const typingSpeed = 46;
    let typingTimeout = null;
    let isTyping = false;
    let balloonInterval = null;
    let fwAnimationId = null;
    let fwLastTime = 0;
    const fireworks = [];
    const sparks = [];
    const fwCtx = fireworksCanvas.getContext("2d");

    function clearTypingTimeout() {
      if (typingTimeout) {
        clearTimeout(typingTimeout);
        typingTimeout = null;
      }
    }

    function wait(ms) {
      return new Promise((resolve) => {
        typingTimeout = setTimeout(resolve, ms);
      });
    }

    async function typeLine(text) {
      for (let i = 0; i < text.length; i += 1) {
        typedText.textContent += text[i];
        await wait(typingSpeed);
      }
    }

    async function runTypewriter() {
      if (isTyping) return;

      isTyping = true;
      typedText.textContent = "";
      finalLine.classList.remove("show");
      memoryBtn.classList.remove("show");
      finalBtn.classList.remove("show");
      memoryTreeWrap.classList.remove("show");
      typedText.innerHTML = "";
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "|";
      typedText.appendChild(cursor);

      for (const part of scriptLines) {
        const current = typedText.textContent.replace("|", "");
        typedText.textContent = current;
        await typeLine(part.text);
        typedText.textContent += "|";
        await wait(part.pauseAfter);
      }

      finalLine.classList.add("show");
      memoryBtn.classList.add("show");
      isTyping = false;
    }

    function createFlower() {
      const flower = document.createElement("span");
      flower.className = "flower";
      flower.style.left = Math.random() * 100 + "vw";
      flower.style.setProperty("--dur", (10 + Math.random() * 7).toFixed(2) + "s");
      flower.style.setProperty("--swayDur", (4 + Math.random() * 2.4).toFixed(2) + "s");
      flower.style.setProperty("--size", (10 + Math.random() * 9).toFixed(0) + "px");
      flower.style.setProperty("--drift", (Math.random() * 90 - 45).toFixed(0) + "px");
      flower.style.setProperty("--rot", (Math.random() * 180 - 90).toFixed(0) + "deg");
      flower.style.setProperty("--z", String(1 + Math.floor(Math.random() * 2)));
      balloonLayer.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 17000);
    }

    function launchBalloons() {
      if (balloonInterval) return;
      for (let i = 0; i < 8; i += 1) {
        setTimeout(createFlower, i * 240);
      }
      balloonInterval = setInterval(createFlower, 900);
    }

    function showMessage() {
      intro.classList.add("hidden");
      messageZone.classList.remove("hidden");
      launchBalloons();
      runTypewriter();
      bgMusic.play().catch(error => console.log("Music play failed:", error));
    }

    function showMemoryTree() {
      memoryTreeWrap.classList.add("show");
      memoryBtn.classList.remove("show");
      finalBtn.classList.add("show");
    }

    function resizeFireworksCanvas() {
      fireworksCanvas.width = window.innerWidth * window.devicePixelRatio;
      fireworksCanvas.height = window.innerHeight * window.devicePixelRatio;
      fwCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    function launchFirework() {
      fireworks.push({
        x: Math.random() * window.innerWidth,
        y: window.innerHeight + 10,
        tx: 120 + Math.random() * (window.innerWidth - 240),
        ty: 80 + Math.random() * (window.innerHeight * 0.45),
        speed: 5 + Math.random() * 2,
        hue: 25 + Math.random() * 360
      });
    }

    function explode(x, y, hue) {
      const count = 70 + Math.floor(Math.random() * 18);
      for (let i = 0; i < count; i += 1) {
        const angle = (Math.PI * 2 * i) / count;
        const velocity = 1.8 + Math.random() * 4.8;
        sparks.push({
          x,
          y,
          vx: Math.cos(angle) * velocity,
          vy: Math.sin(angle) * velocity,
          alpha: 1,
          life: 55 + Math.random() * 28,
          size: 1.2 + Math.random() * 2.8,
          hue: hue + (Math.random() * 40 - 20)
        });
      }
    }

    function animateFireworks(timestamp) {
      if (!fwLastTime) fwLastTime = timestamp;
      const delta = timestamp - fwLastTime;
      fwLastTime = timestamp;

      fwCtx.fillStyle = "rgba(5, 5, 12, 0.20)";
      fwCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      if (Math.random() < 0.055) launchFirework();

      for (let i = fireworks.length - 1; i >= 0; i -= 1) {
        const f = fireworks[i];
        const dx = f.tx - f.x;
        const dy = f.ty - f.y;
        const dist = Math.hypot(dx, dy);

        if (dist < 8) {
          explode(f.x, f.y, f.hue);
          fireworks.splice(i, 1);
          continue;
        }

        f.x += (dx / dist) * f.speed;
        f.y += (dy / dist) * f.speed;

        fwCtx.beginPath();
        fwCtx.arc(f.x, f.y, 2.1, 0, Math.PI * 2);
        fwCtx.fillStyle = `hsla(${f.hue}, 100%, 70%, 0.95)`;
        fwCtx.shadowColor = `hsla(${f.hue}, 100%, 70%, 0.9)`;
        fwCtx.shadowBlur = 12;
        fwCtx.fill();
      }

      for (let i = sparks.length - 1; i >= 0; i -= 1) {
        const s = sparks[i];
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.035;
        s.vx *= 0.992;
        s.vy *= 0.992;
        s.life -= delta * 0.06;
        s.alpha = Math.max(0, s.life / 70);

        if (s.life <= 0 || s.alpha <= 0) {
          sparks.splice(i, 1);
          continue;
        }

        fwCtx.beginPath();
        fwCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        fwCtx.fillStyle = `hsla(${s.hue}, 100%, 72%, ${s.alpha})`;
        fwCtx.shadowColor = `hsla(${s.hue}, 100%, 72%, ${s.alpha})`;
        fwCtx.shadowBlur = 10;
        fwCtx.fill();
      }

      fwAnimationId = requestAnimationFrame(animateFireworks);
    }

    function openFinalSurprise() {
      surpriseOverlay.classList.add("show");
      surpriseOverlay.setAttribute("aria-hidden", "false");
      resizeFireworksCanvas();
      fwCtx.fillStyle = "rgba(5, 5, 12, 1)";
      fwCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      fwLastTime = 0;
      if (!fwAnimationId) {
        for (let i = 0; i < 4; i += 1) launchFirework();
        fwAnimationId = requestAnimationFrame(animateFireworks);
      }
    }

    function closeFinalSurprise() {
      surpriseOverlay.classList.remove("show");
      surpriseOverlay.setAttribute("aria-hidden", "true");
      if (fwAnimationId) {
        cancelAnimationFrame(fwAnimationId);
        fwAnimationId = null;
      }
      fireworks.length = 0;
      sparks.length = 0;
      fwCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }

    function restartMessage() {
      clearTypingTimeout();
      isTyping = false;
      runTypewriter();
    }

    startBtn.addEventListener("click", showMessage);
    memoryBtn.addEventListener("click", showMemoryTree);
    finalBtn.addEventListener("click", openFinalSurprise);
    restartBtn.addEventListener("click", restartMessage);
    closeSurpriseBtn.addEventListener("click", closeFinalSurprise);
    window.addEventListener("resize", resizeFireworksCanvas);

    // Auto-play music on page load
    window.addEventListener("DOMContentLoaded", async () => {
      try {
        await bgMusic.play();
      } catch (error) {
        console.log("Autoplay prevented by browser, waiting for user interaction.", error);
      }
    });

    // Fallback: Play music on any user interaction
    document.addEventListener("click", () => {
      if (bgMusic.paused) {
        bgMusic.play().catch(error => console.log("Music play failed:", error));
      }
    }, { once: true });


  </script>
</body>
